<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>GVCC - Student Dashboard</title>
    
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; text-align: center; margin: 0; padding: 0; }
        .header { background: #003366; color: white; padding: 20px; font-size: 20px; font-weight: bold; }
        .sub-header { font-size: 14px; opacity: 0.8; margin-top: 5px; }
        .tagline { background: white; color: #003366; padding: 10px; margin: 15px auto; width: 85%; max-width: 300px; font-size: 12px; font-weight: bold; border-radius: 10px; }
        
        .student-card { background: white; margin: 15px auto; padding: 15px; max-width: 350px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: left; width: 85%; }
        .student-title { font-weight: bold; color: #003366; border-bottom: 2px solid #f4f6f9; padding-bottom: 5px; margin-bottom: 10px; font-size: 16px; }
        .info-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 14px; }
        .info-label { font-weight: bold; color: #555; }
        .info-value { color: #333; font-weight: bold; }

        .container { padding: 20px; }
        .btn { display: block; background: #007bff; color: white; text-decoration: none; padding: 15px; margin: 12px auto; width: 85%; max-width: 300px; border-radius: 10px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; }
        .btn:hover { background: #0056b3; }
        .btn-live { background: #28a745; text-decoration: none; display: inline-block; width: 85%; max-width: 300px; padding: 12px; border-radius: 8px; color: white; font-weight: bold; margin-bottom: 10px; }
        .btn-logout { background: #dc3545; }
        .btn-logout:hover { background: #c82333; }
        
        #loading { font-weight: bold; color: orange; margin: 50px auto; font-size: 18px; }
        #mainContent { display: none; }
        .footer { margin-top: 30px; padding: 15px; background: #003366; color: white; font-size: 14px; }
    </style>
</head>
<body>

    <div id="loading">⏳ Securing Connection & Loading Profile...</div>

    <div id="mainContent">
        <div class="header">
            📚 Gyan Varsha Coaching Center
            <div class="sub-header">Learn • Practice • Succeed</div>
            <div class="tagline">✨ हम वादा नहीं, पर दावा जरूर करते हैं ✨</div>
        </div>

        <div class="student-card">
            <div class="student-title">👤 Student Details</div>
            <div class="info-row"><span class="info-label">Name:</span> <span id="studentName" class="info-value">--</span></div>
            <div class="info-row"><span class="info-label">Roll Number:</span> <span id="studentRollDisplay" class="info-value">--</span></div>
            <div class="info-row"><span class="info-label">Class:</span> <span id="studentClass" class="info-value">--</span></div>
        </div>

        <div class="container">
            <a href="https://meet.google.com/iwb-mgyk-mpd" class="btn-live" target="_blank">🎥 Join Live Class</a>
            <button class="btn" onclick="window.location.href='notes.html'">📚 Notes</button>
            <button class="btn" onclick="window.location.href='notice.html'">📢 Notice Board</button>
            <button class="btn" onclick="window.location.href='test.html'">📝 Online Test</button>
            <button class="btn" onclick="window.location.href='day2.html'">🚀 Day 2 Test</button>
            <button class="btn" onclick="window.location.href='result.html'">📊 Result</button>
            <button class="btn" onclick="window.location.href='results.html'">🚀 Day 1 Performers 🏆</button>
            
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 20px auto; width: 85%;">
            <button class="btn btn-logout" id="logoutBtn">🔒 Logout Securely</button>
        </div>

        <div class="footer">
            <p>📚 Create By: Md Faiyaz</p>
            <p>📍 Hirauta, Sheohar</p>
            <p>© Gyan Varsha Coaching Center</p>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJX_dyLK80p2rNqSVvGY67TpWV7e_UdPI",
        authDomain: "gvcc-database.firebaseapp.com",
        projectId: "gvcc-database",
        storageBucket: "gvcc-database.firebasestorage.app",
        messagingSenderId: "1063216875940",
        appId: "1:1063216875940:web:a4ee2f39b01896b44c5931"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const activeRoll = localStorage.getItem("studentRoll");
    if (!activeRoll) {
        window.location.href = "student-login.html";
    } else {
        fetchStudentData(activeRoll);
    }

    async function fetchStudentData(roll) {
        try {
            const docRef = doc(db, "students", roll);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                let studentName = data["Name "] || data.Name || "N/A";
                let studentClass = data["Class "] || data.Class || "N/A";
                
                document.getElementById("studentName").innerText = studentName;
                document.getElementById("studentRollDisplay").innerText = roll;
                document.getElementById("studentClass").innerText = studentClass;
                
                document.getElementById("loading").style.display = "none";
                document.getElementById("mainContent").style.display = "block";
            } else {
                alert("Session Error: Profile not found.");
                logout();
            }
        } catch (error) {
            console.error(error);
            document.getElementById("loading").innerText = "⚠️ Connection timeout. Refresh the page.";
        }
    }

    function logout() {
        localStorage.removeItem("studentRoll");
        window.location.href = "student-login.html";
    }
    document.getElementById("logoutBtn").addEventListener("click", logout);
</script>
</body>
</html>
