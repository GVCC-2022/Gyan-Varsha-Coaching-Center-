<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GVCC Student Portal</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    .box{
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 350px;
      margin: 40px auto;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    h1{
      color: #003366;
      margin-bottom: 20px;
    }

    input{
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
      box-sizing: border-box;
    }

    button{
      background: #007bff;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      width: 95%;
      cursor: pointer;
      font-size: 16px;
      margin-top: 8px;
    }

    button:active{
      transform: scale(0.99);
    }

    #msg{
      margin-top: 12px;
      font-weight: bold;
      min-height: 24px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>🎓 Student Portal</h1>

    <input type="text" id="roll" placeholder="Roll Number" />
    <input type="password" id="password" placeholder="Password" />

    <button id="loginBtn" type="button">Login</button>

    <p id="msg"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJX_dyLK80p2rNqSVvGY67TpWV7e_UdPI",
      authDomain: "gvcc-database.firebaseapp.com",
      projectId: "gvcc-database",
      storageBucket: "gvcc-database.firebasestorage.app",
      messagingSenderId: "1063216875940",
      appId: "1:1063216875940:web:a4ee2f39b01896b44c5931"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const roll = document.getElementById("roll").value.trim();
      const password = document.getElementById("password").value.trim();
      const msg = document.getElementById("msg");

      msg.innerHTML = "";

      if (!roll || !password) {
        msg.innerHTML = "⚠️ Please fill all fields";
        return;
      }

      try {
        const docRef = doc(db, "students", roll);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
          msg.innerHTML = "❌ Roll Number Not Found";
          return;
        }

        const data = docSnap.data();

        const dbPassword = String(data.Password ?? data.password ?? "").trim();
        const enteredPassword = String(password).trim();

        if (dbPassword === enteredPassword) {
          localStorage.setItem("studentRoll", roll);
          localStorage.setItem("studentName", String(data.Name ?? data.name ?? "Student"));
          localStorage.setItem("studentClass", String(data.Class ?? data.class ?? ""));
          window.location.href = "dashboard.html";
        } else {
          msg.innerHTML = "❌ Wrong Password";
        }
      } catch (error) {
        console.error(error);
        msg.innerHTML = "❌ Error: " + error.message;
      }
    });
  </script>
</body>
</html>
