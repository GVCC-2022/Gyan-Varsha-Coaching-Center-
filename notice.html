<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notice Board</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#003366;
color:white;
text-align:center;
padding:20px;
}

.notice{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

h2{
color:#003366;
}
</style>
</head>

<body>

<div class="header">
<h1>📢 Notice Board</h1>
</div>

<div class="notice">
<h2>🔴 Today's Live Class</h2>
<p>Time: 11:00 AM</p>
<p>Subject: Mathematics</p>
</div>

<div class="notice">
<h2>📝 Monthly Test</h2>
<p>Date: Coming Soon</p>
</div>

<div class="notice">
<h2>📚 New Notes Added</h2>
<p>Class 10 Maths Formula Notes Available</p>
</div>

<div class="notice">
<h2>🏆 Latest Result</h2>
<p>Class 9 History Monthly Test Result Published</p>
</div>

</body>
</html>
