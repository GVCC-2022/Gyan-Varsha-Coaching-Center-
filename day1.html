<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 1 - Basic Maths Mission</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f9;
            text-align: center;
            margin: 0;
            padding: 0;
            user-select: none; /* Prevents text selection/copying */
        }

        .header {
            background: #003366;
            color: white;
            padding: 25px 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .header h1 { margin: 0; font-size: 24px; }
        .header p { margin: 5px 0 0 0; opacity: 0.9; font-size: 16px; }

        .box {
            background: white;
            margin: 20px auto;
            padding: 25px;
            border-radius: 12px;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        input {
            width: 95%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        input:read-only {
            background-color: #e9ecef;
            color: #495057;
            cursor: not-allowed;
        }

        input[type="radio"] {
            width: auto;
            margin-right: 10px;
            transform: scale(1.2);
        }

        button {
            background: #007bff;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled { background: #cccccc; cursor: not-allowed; }
        .footer { background: #003366; color: white; padding: 15px; margin-top: 40px; font-size: 14px; }
        #questions { text-align: left; padding: 15px 5px; }
        #questions h3 { font-size: 18px; color: #333; margin-top: 20px; }
        #timer { font-size: 22px; color: #d9534f; font-weight: bold; margin: 15px 0; }
        
        #waBtn {
            background: #25d366; color: white; padding: 12px; border-radius: 8px;
            text-decoration: none; font-weight: bold; display: none; margin-top: 15px;
            text-align: center;
        }

        #result { margin-top: 20px; padding: 15px; border-radius: 8px; background: #e9ecef; }
        
        #camera {
            width: 110px; height: 140px; position: fixed; top: 15px; right: 15px;
            border: 3px solid #d9534f; border-radius: 12px; display: none;
            object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 1000;
        }
        #msg { font-weight: bold; margin: 15px 0; font-size: 16px; color: #d9534f; }
    </style>
</head>
<body>

<div class="header">
    <h1>🧮 Gyan Varsha Basic Maths Mission</h1>
    <p>Day 1 - Arithmetic Foundation</p>
</div>

<div class="box">
    <!-- Verification View Loader Section -->
    <div id="authLoader">
        <p style="color: #003366; font-weight: bold;">🔄 Verifying Student Profile from Database...</p>
    </div>

    <!-- Main Entry Input Portal -->
    <div id="loginSection" style="display:none;">
        <input type="text" id="roll" placeholder="Roll Number" readonly>
        <input type="text" id="name" placeholder="Student Name" readonly>
        <input type="password" id="password" placeholder="Enter Day 1 Password">
        <button id="startBtn" onclick="startMission()">🚀 Start Day 1</button>
    </div>

    <!-- Active Live Test Interface -->
    <h2 id="timer" style="display:none;">⏰ 15:00</h2>
    <div id="questions"></div>

    <button id="submitBtn" onclick="checkDuplicity()" style="display:none;">📝 Submit Test</button>
    <a id="waBtn" target="_blank" href="#">按 Send Result to Teacher</a>
    
    <div id="result"></div>
    <p id="msg"></p>
</div>

<video id="camera" autoplay playsinline muted></video>

<div class="footer">
    Prepared By: Md Faiyaz
</div>

<script>
// --- ANTI-CHEAT & PROCTORING CONTROLS ---
let warningCount = 0;
let time = 900; 
let testTimerInterval;
let globalClass = "";

// Security: Cut/Copy/Paste & Right-Click Strict Prevention
document.addEventListener('contextmenu', event => event.preventDefault());
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u' || e.key === 'I')) {
        e.preventDefault();
        alert("❌ Security Alert: Cheating protection active!");
    }
});

function startMission(){
    let roll = document.getElementById("roll").value;
    let password = document.getElementById("password").value;

    if(password !== "GVCCDAY1"){
        alert("❌ Wrong Password! Admin dwara bataya gya aaj ka code dalein.");
        return;
    }
    if(localStorage.getItem("day1_submitted_" + roll)){
        alert("❌ Aap Day 1 Test pehle hi submit kar chuke hain.");
        return;
    }

    // Media Camera Activation Engine
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(function(stream){
        document.getElementById("camera").style.display = "block";
        document.getElementById("camera").srcObject = stream;
        setupTestLayout();
    })
    .catch(function(){
        alert("❌ Camera Permission Needed! Test dene ke liye camera on karna anivaryah hai.");
    });
}

function setupTestLayout() {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("timer").style.display = "block";
    document.getElementById("submitBtn").style.display = "block";
    document.getElementById("msg").innerHTML = "";

    // Security Monitoring: Real-time Tab Switching Protection
    document.addEventListener("visibilitychange", function(){
        if(document.hidden){
            warningCount++;
            alert("⚠️ Warning " + warningCount + "/3: Tab change mat kijiye! 3 bar se zyada karne par auto-submit ho jayega.");
            if(warningCount >= 3) {
                alert("❌ Systems Locked: Auto-Submitting test due to multiple tab changes.");
                processResult();
            }
        }
    });

    // 1-2 Temporary setup math questions (Dynamic for all classes)
    document.getElementById("questions").innerHTML = `
        <h3>Q1. 36 + 48 = ?</h3>
        <input type="radio" name="q1" value="0"> 82<br>
        <input type="radio" name="q1" value="1"> 84<br>
        <input type="radio" name="q1" value="0"> 86<br>
        <input type="radio" name="q1" value="0"> 88<br>

        <h3>Q2. 95 - 37 = ?</h3>
        <input type="radio" name="q2" value="0"> 56<br>
        <input type="radio" name="q2" value="0"> 57<br>
        <input type="radio" name="q2" value="1"> 58<br>
        <input type="radio" name="q2" value="0"> 59<br>
    `;

    testTimerInterval = setInterval(function(){
        let minutes = Math.floor(time/60);
        let seconds = time%60;
        document.getElementById("timer").innerHTML = "⏰ " + minutes + ":" + (seconds < 10 ? "0" + seconds : seconds);
        time--;

        if(time < 0){
            clearInterval(testTimerInterval);
            alert("⏰ Time Over!");
            processResult();
        }
    }, 1000);
}

function checkDuplicity(){
    let roll = document.getElementById("roll").value;
    
    // Cross check firebase if student already submitted this day's quiz
    const q = window.query(
        window.collection(window.db, "results"),
        window.where("roll", "==", roll),
        window.where("day", "==", "day1")
    );
      
    window.getDocs(q).then((snapshot) => {
        if (!snapshot.empty) {
            alert("❌ Database record shows you have already submitted this test.");
            return;
        }
        processResult();
    }).catch(err => {
        console.error(err);
        processResult(); 
    });
}

function processResult(){
    clearInterval(testTimerInterval);
    let roll = document.getElementById("roll").value;
    let sName = document.getElementById("name").value;
    
    let score = 0;
    document.querySelectorAll('input[type=radio]:checked').forEach(e => score += Number(e.value));
    localStorage.setItem("day1_submitted_" + roll, "true");

    let totalQuestions = 2;
    let percent = (score / totalQuestions) * 100;
    let status = percent >= 60 ? "✅ PASS" : "❌ FAIL";
    let medal = "";

    if(percent >= 90) medal = "🥇 Gold";
    else if(percent >= 75) medal = "🥈 Silver";
    else if(percent >= 60) medal = "🥉 Bronze";
    else medal = "📚 Needs Practice";

    document.getElementById("result").innerHTML = `
        <h2>Result Processed!</h2>
        <p>Score: ${score}/${totalQuestions}</p>
        <p>Percentage: ${percent.toFixed(0)}%</p>
        <h3>${status}</h3>
        <h3>${medal}</h3>
    `;

    document.querySelectorAll('input[type="radio"]').forEach(e => e.disabled = true);
    document.getElementById("submitBtn").style.display = "none";
    document.getElementById("msg").style.color = "#333";
    document.getElementById("msg").innerHTML = "Total Warnings Triggered: " + warningCount;

    let msgText = `🧮 Gyan Varsha Basic Maths Mission Day 1%0A%0A` +
                  `Name: ${sName}%0A` +
                  `Roll No: ${roll}%0A` +
                  `Class: ${globalClass}%0A` +
                  `Score: ${score}/${totalQuestions}%0A` +
                  `Percentage: ${percent.toFixed(0)}%%0A` +
                  `Result: ${status}%0A` +
                  `Warnings: ${warningCount}%0A` +
                  `Medal: ${medal}`;

    document.getElementById("waBtn").href = "https://wa.me/916203491210?text=" + msgText;
    document.getElementById("waBtn").style.display = "block";

    if(document.getElementById("camera").srcObject) {
        document.getElementById("camera").srcObject.getTracks().forEach(track => track.stop());
        document.getElementById("camera").style.display = "none";
    }

    // Cloud Database Firestore Save Engine
    window.addDoc(window.collection(window.db, "results"), {
        name: sName,
        roll: roll,
        class: globalClass,
        day: "day1",
        score: score,
        percentage: percent.toFixed(0),
        medal: medal,
        warnings: warningCount,
        result: status,
        date: new Date().toLocaleString()
    })
    .then(() => console.log("Cloud Saved!"))
    .catch((error) => console.log("Error:", error));
}
</script>

<script type="module">
// --- FIRESTORE DATABASE VERIFICATION & RUNNER ---
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, collection, addDoc, getDocs, query, where
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJX_dyLK80p2rNqSVvGY67TpWV7e_UdPI",
  authDomain: "gvcc-database.firebaseapp.com",
  projectId: "gvcc-database",
  storageBucket: "gvcc-database.firebasestorage.app",
  messagingSenderId: "1063216875940",
  appId: "1:1063216875940:web:a4ee2f39b01896b44c5931"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.addDoc = addDoc;
window.collection = collection;
window.getDocs = getDocs;
window.query = query;
window.where = where;

// Auto profile checker on load
window.addEventListener("DOMContentLoaded", async () => {
    const activeRoll = localStorage.getItem("studentRoll");
    
    if(!activeRoll) {
        document.getElementById("authLoader").innerHTML = "❌ Session Mismatch: Please login from dashboard first.";
        return;
    }

    try {
        const docRef = doc(db, "students", activeRoll);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();
            let sName = data["Name "] || data.Name || "N/A";
            let sClass = data["Class "] || data.Class || "N/A";
            
            globalClass = String(sClass).trim();

            // Set data to input fields
            document.getElementById("roll").value = activeRoll;
            document.getElementById("name").value = sName;
            
            document.getElementById("authLoader").style.display = "none";
            document.getElementById("loginSection").style.display = "block";
        } else {
            document.getElementById("authLoader").innerHTML = "❌ Profile Error: Student record not found in database.";
        }
    } catch (error) {
        console.error(error);
        document.getElementById("authLoader").innerHTML = "⚠️ Cloud Network Timeout. Please refresh page.";
    }
});
</script>
</body>
</html>
