<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Test</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#003366;
color:white;
text-align:center;
padding:20px;
}

.container{
padding:20px;
max-width:700px;
margin:auto;
}

.question{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:15px;
background:#007bff;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<h1>📝 Online Test</h1>
<p>Class 10 Mathematics Demo Test</p>
</div>

<div class="container">

<div class="question">
<p>1. HCF(12,18) = ?</p>
<input type="radio" name="q1" value="0"> 2<br>
<input type="radio" name="q1" value="1"> 6<br>
<input type="radio" name="q1" value="0"> 12
</div>

<div class="question">
<p>2. √64 = ?</p>
<input type="radio" name="q2" value="0"> 6<br>
<input type="radio" name="q2" value="1"> 8<br>
<input type="radio" name="q2" value="0"> 10
</div>

<div class="question">
<p>3. Value of π ≈ ?</p>
<input type="radio" name="q3" value="1"> 3.14<br>
<input type="radio" name="q3" value="0"> 2.14<br>
<input type="radio" name="q3" value="0"> 4.14
</div>

<button onclick="checkScore()">Submit Test</button>

<div id="result"></div>

</div>

<script>
function checkScore(){

let score = 0;

let answers = document.querySelectorAll('input[type="radio"]:checked');

answers.forEach((ans)=>{
score += Number(ans.value);
});

document.getElementById("result").innerHTML =
"🎉 Your Score: " + score + " / 3";
}
</script>

</body>
</html>
